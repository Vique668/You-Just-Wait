<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Ну, погоди! — Лови яйца</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f9f6f0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  width: 100%;
  height: 100%;
  height: 100dvh;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  position: fixed;
  overscroll-behavior: none;
}

.game-bg {
  position: absolute;
  inset: 0;
  background-image: url('background.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  z-index: -1;
}

#score {
  position: fixed;
  top: max(10px, env(safe-area-inset-top));
  left: 10px;
  font-size: clamp(16px, 4vw, 22px);
  font-weight: bold;
  background: rgba(255,255,255,0.7);
  padding: 6px 12px;
  border-radius: 8px;
  z-index: 10;
}

#chicks {
  position: fixed;
  top: max(60px, calc(env(safe-area-inset-top) + 50px));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: clamp(15px, 4vw, 40px);
  font-size: clamp(24px, 6vw, 32px);
  z-index: 10;
}

.egg {
  position: absolute;
  font-size: clamp(28px, 7vw, 34px);
  transform: translate(-50%, -50%);
  cursor: pointer;
  user-select: none;
  touch-action: manipulation;
  z-index: 20;
}

#catcher {
  position: fixed;
  height: clamp(120px, 25vw, 189px);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 50;
  transition: left 0.05s linear, top 0.05s linear;
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 15px;
}

#quiz {
  background: white;
  padding: clamp(16px, 4vw, 24px);
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  text-align: center;
  max-height: 90dvh;
  overflow-y: auto;
}

#quiz p {
  font-size: clamp(16px, 4vw, 20px);
  margin: 0 0 15px 0;
}

.quiz-option {
  margin: 8px 0;
  padding: clamp(12px, 3vw, 16px);
  border: 2px solid #ccc;
  border-radius: 8px;
  cursor: pointer;
  font-size: clamp(15px, 3.5vw, 18px);
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.quiz-option:hover {
  background: #f0f0f0;
}

.quiz-option:active {
  background: #e0e0e0;
}

.quiz-option.correct {
  background: #90EE90 !important;
  border-color: #4CAF50;
}

.quiz-option.wrong {
  background: #FFB6C1 !important;
  border-color: #f44336;
}

#gameover {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  color: white;
  font-size: clamp(24px, 6vw, 40px);
  z-index: 200;
  flex-direction: column;
  padding: 20px;
  text-align: center;
}

#restartBtn {
  margin-top: 20px;
  padding: clamp(12px, 3vw, 15px) clamp(24px, 6vw, 30px);
  font-size: clamp(16px, 4vw, 20px);
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  min-height: 44px;
  min-width: 44px;
  touch-action: manipulation;
}

#restartBtn:hover {
  background: #45a049;
}

#restartBtn:active {
  background: #3d8b40;
  transform: scale(0.98);
}

/* Адаптация для очень маленьких экранов */
@media (max-height: 500px) and (orientation: landscape) {
  #chicks {
    top: 50px;
    font-size: 24px;
    gap: 15px;
  }
  #catcher {
    height: 100px;
  }
  #quiz p {
    font-size: 14px;
  }
  .quiz-option {
    padding: 8px;
    font-size: 14px;
    margin: 4px 0;
  }
}

/* Адаптация для планшетов */
@media (min-width: 768px) and (max-width: 1024px) {
  #catcher {
    height: 160px;
  }
}
</style>
</head>

<body>
<div class="game-bg"></div>
<div id="score">Счёт: 0</div>
<div id="chicks"></div>
<div id="gameover">
  <div id="gameoverText"></div>
  <button id="restartBtn">Играть снова</button>
</div>
<img id="catcher" src="wolf.png" />

<div id="overlay">
  <div id="quiz"></div>
</div>

<script>
let score = 0;
let misses = 0;
let currentEgg = null;
let gameActive = true;
let quizActive = false;
let catcherX = window.innerWidth / 2;
let catcherY = window.innerHeight / 2;

const scoreEl = document.getElementById('score');
const chicksEl = document.getElementById('chicks');
const gameOverEl = document.getElementById('gameover');
const gameOverTextEl = document.getElementById('gameoverText');
const restartBtn = document.getElementById('restartBtn');
const overlay = document.getElementById('overlay');
const quizEl = document.getElementById('quiz');
const catcherEl = document.getElementById('catcher');

const CM = 37.8;
const IMG_WIDTH = 1000;
const IMG_HEIGHT = 600;
const CHICKENS = [
  { x: 140, y: 100 },
  { x: 860, y: 100 }
];

const allQuestions = [
  { q: "My aunt ___ got a big house.", options: ["have got", "has got", "is got"], correct: "has got" },
  { q: "The fridge ___ white and new.", options: ["am", "is", "are"], correct: "is" },
  { q: "I've got ___ uncle. He is very kind.", options: ["a", "an", "is"], correct: "an" },
  { q: "___ your sister got straight hair?", options: ["Have", "Has", "Is"], correct: "Has" },
  { q: "The cupboards ___ in the kitchen.", options: ["is", "am", "are"], correct: "are" },
  { q: "My cousins ___ got a parrot.", options: ["has", "have", "are"], correct: "have" },
  { q: "My bedroom ___ small but very nice.", options: ["am", "is", "are"], correct: "is" },
  { q: "I ___ got a new bike for my birthday.", options: ["has", "have", "am"], correct: "have" },
  { q: "She has got ___ armchair in her room.", options: ["a", "an", "are"], correct: "an" },
  { q: "___ the mirror on the wall?", options: ["Is", "Are", "Have"], correct: "Is" },
  { q: "The bath ___ in the bathroom.", options: ["am", "is", "are"], correct: "is" },
  { q: "He ___ got a sister.", options: ["hasn't", "haven't", "isn't"], correct: "hasn't" },
  { q: "___ your grandparents got a garden?", options: ["Has", "Have", "Are"], correct: "Have" },
  { q: "The wardrobe ___ very tall.", options: ["am", "is", "are"], correct: "is" },
  { q: "I've got ___ old lamp.", options: ["a", "an", "is"], correct: "an" },
  { q: "My eyes ___ brown.", options: ["am", "is", "are"], correct: "are" },
  { q: "___ your cousin got a pet?", options: ["Do", "Has", "Have"], correct: "Has" },
  { q: "There is ___ armchair next to the sofa.", options: ["a", "an", "are"], correct: "an" },
  { q: "My brother ___ ten years old.", options: ["am", "is", "are"], correct: "is" },
  { q: "We ___ got a lot of books in the bookcase.", options: ["has", "have", "are"], correct: "have" },
  { q: "The shower ___ next to the bath.", options: ["am", "is", "are"], correct: "is" },
  { q: "The kitchen ___ very big.", options: ["isn't", "aren't", "hasn't"], correct: "isn't" },
  { q: "___ you got a big family?", options: ["Has", "Have", "Do"], correct: "Have" },
  { q: "My house ___ very beautiful.", options: ["am", "is", "are"], correct: "is" },
  { q: "I've got ___ aunt in London.", options: ["a", "an", "is"], correct: "an" },
  { q: "The chairs ___ next to the table.", options: ["is", "am", "are"], correct: "are" },
  { q: "She has got ___ new sofa.", options: ["a", "an", "are"], correct: "a" },
  { q: "___ the cat under the table?", options: ["Is", "Are", "Has"], correct: "Is" },
  { q: "My friend ___ got a new computer.", options: ["have", "has", "is"], correct: "has" },
  { q: "The cooker ___ next to the fridge.", options: ["am", "is", "are"], correct: "is" }
];

let usedQuestionIndices = new Set();

function shuffleArray(array) {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function shuffleOptions(options) {
  return shuffleArray(options);
}

function getRandomQuestion() {
  if (usedQuestionIndices.size >= allQuestions.length) {
    usedQuestionIndices.clear();
  }
  
  let availableIndices = [];
  for (let i = 0; i < allQuestions.length; i++) {
    if (!usedQuestionIndices.has(i)) {
      availableIndices.push(i);
    }
  }
  
  const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
  usedQuestionIndices.add(randomIndex);
  
  const question = allQuestions[randomIndex];
  const shuffledOpts = shuffleOptions(question.options);
  
  return {
    q: question.q,
    options: shuffledOpts,
    correct: question.correct
  };
}

function getChickenCoords() {
  const bg = document.querySelector('.game-bg').getBoundingClientRect();
  const scale = Math.min(bg.width / IMG_WIDTH, bg.height / IMG_HEIGHT);
  const cx = bg.left + bg.width / 2;
  const cy = bg.top + bg.height / 2;

  return CHICKENS.map(p => {
    const dir = p.x < IMG_WIDTH / 2 ? 1 : -1;
    return {
      x: cx + ((p.x + dir * 5 * CM) - IMG_WIDTH / 2) * scale,
      y: cy + ((p.y + 2 * CM) - IMG_HEIGHT / 2) * scale
    };
  });
}

function getTarget() {
  return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
}

function handleMissedEgg(x, y) {
  const temp = document.createElement('div');
  temp.textContent = '🐣';
  temp.style.position = 'absolute';
  temp.style.left = x + 'px';
  temp.style.top = (y + 3 * CM) + 'px';
  temp.style.transform = 'translate(-50%, -50%)';
  temp.style.fontSize = '36px';
  document.body.appendChild(temp);
  setTimeout(() => temp.remove(), 1000);

  if (misses < 4) {
    const chick = document.createElement('div');
    chick.textContent = '🐣';
    chicksEl.appendChild(chick);
  }

  misses++;
  if (misses >= 4) {
    endGame('🐣 TRY AGAIN 🐣');
    return false;
  }

  return true;
}

class Egg {
  constructor() {
    this.el = document.createElement('div');
    this.el.className = 'egg';
    this.el.textContent = '🥚';
    document.body.appendChild(this.el);

    const start = getChickenCoords()[Math.floor(Math.random() * 2)];
    this.x = start.x;
    this.y = start.y;

    const t = getTarget();
    this.tx = t.x;
    this.ty = t.y;

    this.active = true;
    
    // Универсальный обработчик для мыши и тача
    const handleCatch = (e) => {
      e.preventDefault();
      e.stopPropagation();
      this.catch();
    };
    
    this.el.addEventListener('click', handleCatch);
    this.el.addEventListener('touchstart', handleCatch, { passive: false });
  }

  update() {
    if (!this.active || quizActive) return;
    this.x += (this.tx - this.x) * 0.025;
    this.y += (this.ty - this.y) * 0.025;
    this.el.style.left = this.x + 'px';
    this.el.style.top = this.y + 'px';

    if (Math.abs(this.x - this.tx) < 20 && Math.abs(this.y - this.ty) < 20) {
      this.miss();
    }
  }

  catch() {
    if (!this.active) return;
    this.active = false;
    this.el.remove();
    score++;
    scoreEl.textContent = `Счёт: ${score}`;

    if (score >= 20) {
      endGame('🎉🎊 YOU WIN 🎉🎊');
      return;
    }

    showQuiz();
  }

  miss() {
    if (!this.active) return;
    this.active = false;
    this.el.remove();

    const continueGame = handleMissedEgg(this.x, this.y);
    if (continueGame) {
      nextEgg();
    }
  }
}

function endGame(text) {
  gameActive = false;
  gameOverTextEl.textContent = text;
  gameOverEl.style.display = 'flex';
}

function nextEgg() {
  if (!gameActive) return;
  currentEgg = new Egg();
}

function loop() {
  if (currentEgg) currentEgg.update();
  requestAnimationFrame(loop);
}

function showQuiz() {
  quizActive = true;
  overlay.style.display = 'flex';
  quizEl.innerHTML = '';

  const { q, options, correct } = getRandomQuestion();
  const p = document.createElement('p');
  p.textContent = q;
  quizEl.appendChild(p);

  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    
    const handleAnswer = (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      // Предотвращаем повторное срабатывание
      if (btn.dataset.answered) return;
      btn.dataset.answered = 'true';
      
      if (opt === correct) {
        btn.classList.add('correct');
        setTimeout(() => {
          overlay.style.display = 'none';
          quizActive = false;
          nextEgg();
        }, 500);
      } else {
        btn.classList.add('wrong');
        // Показываем правильный ответ
        quizEl.querySelectorAll('.quiz-option').forEach(b => {
          if (b.textContent === correct) b.classList.add('correct');
        });
        setTimeout(() => {
          overlay.style.display = 'none';
          quizActive = false;
          
          const continueGame = handleMissedEgg(window.innerWidth / 2, window.innerHeight / 2);
          if (continueGame) {
            nextEgg();
          }
        }, 1500);
      }
    };
    
    btn.addEventListener('click', handleAnswer);
    btn.addEventListener('touchstart', handleAnswer, { passive: false });
    quizEl.appendChild(btn);
  });
}

function updateCatcherPosition(x, y) {
  catcherX = x;
  catcherY = y;
  catcherEl.style.left = x + 'px';
  catcherEl.style.top = y + 'px';
}

function restartGame() {
  score = 0;
  misses = 0;
  gameActive = true;
  quizActive = false;
  usedQuestionIndices.clear();
  
  scoreEl.textContent = 'Счёт: 0';
  chicksEl.innerHTML = '';
  gameOverEl.style.display = 'none';
  
  if (currentEgg) {
    currentEgg.el.remove();
    currentEgg = null;
  }
  
  nextEgg();
}

// === УНИВЕРСАЛЬНЫЕ ОБРАБОТЧИКИ ДЛЯ МЫШИ И ТАЧА ===

// Движение мыши (для ПК)
document.addEventListener('mousemove', e => {
  updateCatcherPosition(e.clientX, e.clientY);
});

// Движение пальца (для мобильных)
document.addEventListener('touchmove', e => {
  if (e.touches.length > 0) {
    updateCatcherPosition(e.touches[0].clientX, e.touches[0].clientY);
  }
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchstart', e => {
  if (e.touches.length > 0) {
    updateCatcherPosition(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: true });

// Предотвращаем зум при двойном тапе
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, { passive: false });

// Предотвращаем контекстное меню при долгом нажатии
document.addEventListener('contextmenu', e => e.preventDefault());

// Обработка изменения ориентации экрана
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    catcherX = window.innerWidth / 2;
    catcherY = window.innerHeight / 2;
    updateCatcherPosition(catcherX, catcherY);
  }, 100);
});

// Обработка изменения размера окна (например, при открытии клавиатуры)
window.addEventListener('resize', () => {
  catcherX = Math.min(catcherX, window.innerWidth);
  catcherY = Math.min(catcherY, window.innerHeight);
  updateCatcherPosition(catcherX, catcherY);
});

// Запуск игры
nextEgg();
loop();
restartBtn.addEventListener('click', restartGame);
restartBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  restartGame();
}, { passive: false });
</script>
</body>
</html>
